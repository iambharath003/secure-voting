{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,rgba(9,27,74,0.9),rgba(8,8,12,1)70%);
}
/* Glass container */
.container{
    width:350px;
    padding:35px;
    border-radius:20px;
    background: rgba(34,39,56,0.88);
    backdrop-filter: blur(12px);
    box-shadow:0 0 40px rgba(0,0,0,0.3);
    text-align:center;

}

/* Title */
h2{
    color:white;
    margin-bottom:25px;
    font-size:28px;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:2px solid rgba(59,103,246,0.8);
    border-radius:14px;
    outline:none;
    background:rgba(79,84,102,0.45);
    font-size:15px;
}
input::placeholder{
    color:rgba(220,220,220,0.7)
}

/* Button */
button{
    margin-top:15px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:14px;
    background:rgba(47,118,255,1);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

/* Register link */
.register-text{
    margin-top:18px;
    color:white;
    font-size:14px;
}

.register-text a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}

/* Django message */
.message{
    background:#fee2e2;
    color:#991b1b;
    padding:10px;
    border-radius:10px;
    margin-bottom:12px;
    font-weight:bold;
}

</style>
</head>

<body>

<form method="POST" action="{% url 'signin' %}">
{% csrf_token %}

<div class="container">

<h2>Login</h2>

<!-- Django Messages -->

<input type="text" name="email" placeholder="email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p class="register-text">
Don't have an account?
<a href="{% url 'signup' %}">Register</a>
</p>

</div>

</body>
</html>
