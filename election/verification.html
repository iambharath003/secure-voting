{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Voter Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center,rgba(9,27,74,0.9),rgba(8,8,12,1)70%);
}
/* Glass Card */
.container{
    width:380px;
    padding:35px;
    border-radius:20px;
    background: rgba(34,39,56,0.88);
    backdrop-filter: blur(15px);
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
}

/* Title */
h2{
    color:white;
    margin-bottom:25px;
    font-size:28px;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:14px;
    outline:none;
    background:rgba(79,84,102,0.45);
    font-size:15px;
}

/* Button */
button{
    margin-top:15px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:14px;
    background: linear-gradient(to right,#ff512f,#dd2476);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

/* Message */
.message{
    background:#d1fae5;
    color:#065f46;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Voter Verification</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="voter_id" placeholder="Enter Voter ID" required>

<input type="password" name="secret_key" placeholder="Enter Secret Key" required>

<button type="submit">Verify & Continue</button>

</form>

</div>

</body>
</html>
