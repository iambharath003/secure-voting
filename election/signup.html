{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,rgba(9,27,74,0.9),rgba(8,8,12,1)70%);
}

/* Glass container */
.container{
    width:360px;
    padding:35px;
    border-radius:20px;
    background: rgba(34,39,56,0.88);
    backdrop-filter: blur(12px);
    box-shadow:0 0 40px rgba(0,0,0,0.2);
    text-align:center;
}

/* Title */
.container h2{
    color:white;
    margin-bottom:25px;
    font-size:28px;
}

/* Form vertical */
form{
    display:flex;
    flex-direction:column;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:14px;
    outline:none;
    background:#f1f5f9;
    font-size:15px;
}

/* Button */
button{
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:14px;
    background: linear-gradient(to right,#1e4ed8,#00c6ff);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
}

/* Login text */
.login-text{
    margin-top:18px;
    color:white;
    font-size:14px;
}

.login-text a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>register</h2>

<form method="post" action="{% url 'signup' %}">
{% csrf_token %}

<input type="text" name="fullname" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirm" placeholder="Confirm password" required>

<button type="submit">register</button>

</form>

<p class="login-text">
already have an account?
<a href="{% url 'signin' %}">login</a>
</p>

</div>

</body>
</html>
