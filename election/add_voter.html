<!DOCTYPE html>
<html>
    <head>
        <title>
            ADD VOTER
        </title>
        <style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at center,rgba(9,27,74,0.9),rgba(8,8,12,1)70%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main Card */
.container{
    width:420px;
    background:rgba(34,39,56,0.88);;
    padding:30px;
    border-radius:18px;
    backdrop-filter: blur(15px);
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
label{
    color:white;
    font-size: 18px;
    font-weight: 600;
}

/* Title */
.container h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
}

/* Input Fields */
input[type="text"],
input[type="password"],
input[type="email"]{
    width:100%;
    padding:12px;
    margin-bottom:16px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
    box-sizing: border-box;
    background: rgba(79,84,102,0.45);;
}

input:focus{
    border-color:#2a5298;
    outline:none;
    box-shadow:0 0 8px rgba(42,82,152,0.3);
}

/* Button */
button{
    width:100%;
    padding:14px;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    border:none;
    color:white;
    font-size:17px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
        </style>
    </head>
    <body>
        <div class="container">
        <h2>Add New Voter</h2>
        <form method="POST">
            {% csrf_token %}

            <label>
                username:
            </label>
            <input type="text" name="username" required><br><br>

            <label>
                Email Address:
            </label>
            <input type="text" name="email" required ><br><br>

            <label>
                password:
            </label>
            <input type="text" name="password" required><br><br>

            <label>
                voter id:
            </label>
            <input type="text" name="voter_id" required><br><br>

            <label>
                secret key:
            </label>
            <input type="text" name="secret_key" required><br><br>

            <button type="submit">Add voter</button>

        </form>
        </div>
    </body>
</html>
